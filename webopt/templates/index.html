<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAUDRONIX GT — Panel</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/bear.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --pink:    #ec4899;
            --pink2:   #f472b6;
            --purple:  #a855f7;
            --purple2: #c084fc;
            --cyan:    #06b6d4;
            --cyan2:   #22d3ee;
            --gold:    #fbbf24;
            --orange:  #a855f7;
            --orange2: #c084fc;
            --navy:    #04060f;
            --navy2:   #07091c;
            --card:    rgba(7, 3, 22, 0.92);
            --border:  rgba(168, 85, 247, 0.15);
            --text-muted: rgba(255,255,255,0.38);
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: #fff;
            background: var(--navy);
            overflow-x: hidden;
        }

        /* BG */
        .bg-fixed {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 120% 80% at 0% 0%,    #3b0764 0%, transparent 55%),
                radial-gradient(ellipse 100% 70% at 100% 0%,  #831843 0%, transparent 55%),
                radial-gradient(ellipse 110% 75% at 100% 100%,#0c4a6e 0%, transparent 55%),
                radial-gradient(ellipse  80% 60% at 0%   100%,#3b0764 0%, transparent 55%),
                #050816;
            overflow: hidden;
        }
        .bg-fixed::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 25% 30%,  rgba(168,85,247,0.20) 0%, transparent 55%),
                radial-gradient(ellipse 50% 45% at 75% 70%,  rgba(6,182,212,0.15)  0%, transparent 55%);
        }
        .bg-fixed video {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            min-width: 100%; min-height: 100%;
            object-fit: cover; opacity: 0.4;
        }
        .bg-blur-img {
            position: absolute; inset: -20px;
            background-size: cover; background-position: center;
            filter: blur(40px) brightness(0.5);
            transform: scale(1.1);
        }
        .bg-main-img {
            position: absolute; inset: 0;
            background-size: contain; background-position: center;
            background-repeat: no-repeat; opacity: 0.3;
        }
        .bg-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.2); }

        /* TOPBAR */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            height: 60px;
            background: rgba(4,6,15,0.97);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid transparent;
            background-clip: padding-box;
            box-shadow: 0 1px 0 0 rgba(168,85,247,0.35), 0 2px 20px rgba(236,72,153,0.08);
            display: flex; align-items: center;
            padding: 0 24px;
        }
        .topbar-inner {
            width: 100%; max-width: 1000px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .brand {
            display: flex; align-items: center; gap: 10px;
        }
        .brand-logo {
            width: 32px; height: 32px; border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 0 12px rgba(240,101,41,0.4);
        }
        .brand-name {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(0.75rem, 2.5vw, 1rem);
            letter-spacing: 3px;
            background: linear-gradient(90deg, #fff, var(--purple2), var(--pink2), var(--cyan2), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: brandShimmer 4s linear infinite;
        }
        @keyframes brandShimmer { from{background-position:0% center;} to{background-position:200% center;} }

        .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: linear-gradient(135deg, rgba(236,72,153,0.12), rgba(168,85,247,0.12));
            border: 1px solid rgba(236,72,153,0.3);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.65rem;
            color: var(--pink2);
            letter-spacing: 2px;
            font-weight: 600;
        }
        .live-dot {
            width: 7px; height: 7px;
            background: var(--pink);
            border-radius: 50%;
            animation: blink 1.2s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1;box-shadow:0 0 8px var(--pink),0 0 16px var(--pink);}50%{opacity:0.3;box-shadow:none;} }

        .topbar-actions {
            display: flex; gap: 6px; align-items: center;
        }
        .btn-top {
            display: flex; align-items: center; gap: 5px;
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.55);
            border-color: rgba(255,255,255,0.09);
        }
        .btn-top:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.15); }
        .btn-top.orange { background: rgba(168,85,247,0.15); color: var(--purple2); border-color: rgba(168,85,247,0.3); }
        .btn-top.orange:hover { background: rgba(168,85,247,0.25); box-shadow: 0 0 16px rgba(168,85,247,0.25); }
        .btn-top.yellow { background: rgba(236,72,153,0.12); color: var(--pink2); border-color: rgba(236,72,153,0.28); }
        .btn-top.yellow:hover { background: rgba(236,72,153,0.22); box-shadow: 0 0 16px rgba(236,72,153,0.22); }

        /* MAIN */
        .main {
            position: relative; z-index: 1;
            max-width: 780px;
            margin: 0 auto;
            padding: 28px 18px 130px;
        }

        /* SECTION HEADER */
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .section-line {
            flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--pink), var(--purple), var(--cyan), transparent);
            margin-left: 16px;
            opacity: 0.6;
        }

        /* EMPTY */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 16px;
            opacity: 0.4;
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.05);} }
        .empty-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.2);
            margin-bottom: 8px;
        }
        .empty-sub {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.12);
            letter-spacing: 1px;
        }

        /* OTP CARD */
        .otp-card {
            background: linear-gradient(145deg, rgba(10,4,28,0.95), rgba(5,8,25,0.95));
            backdrop-filter: blur(28px);
            border: 1px solid rgba(168,85,247,0.2);
            border-radius: 18px;
            margin-bottom: 14px;
            overflow: hidden;
            animation: cardIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
            transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .otp-card:hover {
            border-color: rgba(236,72,153,0.45);
            transform: translateY(-3px);
            box-shadow: 0 16px 48px rgba(168,85,247,0.2), 0 0 0 1px rgba(236,72,153,0.15);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .otp-card.new-flash {
            animation: cardIn 0.45s cubic-bezier(0.22,1,0.36,1) both, flash 1s ease;
        }
        @keyframes flash {
            0%   { box-shadow: 0 0 0 3px var(--pink), 0 0 50px rgba(236,72,153,0.5), 0 0 100px rgba(168,85,247,0.3); }
            100% { box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
        }

        .card-stripe {
            height: 4px;
            background: linear-gradient(90deg, var(--pink), var(--purple), var(--cyan), transparent);
        }
        .card-stripe.blue { background: linear-gradient(90deg, var(--cyan), var(--purple), var(--pink), transparent); }

        .card-body { padding: 18px 20px 20px; }

        .card-head {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 12px;
            margin-bottom: 16px;
        }
        .card-platform {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--pink2);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .card-platform.blue { color: var(--cyan2); }
        .card-sender {
            font-weight: 700;
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            color: #fff;
            line-height: 1.2;
        }
        .card-account {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            margin-top: 3px;
        }
        .card-time {
            font-size: 0.68rem;
            color: var(--text-muted);
            white-space: nowrap;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            flex-shrink: 0;
        }

        .card-foot {
            display: flex; align-items: center;
            justify-content: space-between; gap: 14px;
            flex-wrap: wrap;
        }
        .otp-code {
            font-family: 'Inter', sans-serif;
            font-size: clamp(2rem, 9vw, 3.2rem);
            font-weight: 900;
            letter-spacing: 12px;
            background: linear-gradient(90deg, #fff, var(--pink2), var(--purple2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 18px rgba(236,72,153,0.7)) drop-shadow(0 0 40px rgba(168,85,247,0.4));
            line-height: 1;
        }

        .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn-copy {
            padding: 11px 22px;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            color: #fff;
            border: none;
            border-radius: 9px;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(168,85,247,0.4);
        }
        .btn-copy:hover { background: linear-gradient(135deg, var(--pink), var(--purple)); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(236,72,153,0.5); }
        .btn-copy:active { transform: translateY(0); }
        .btn-copy.copied { background: linear-gradient(135deg, #059669, #10b981); box-shadow: 0 4px 20px rgba(16,185,129,0.4); }

        .btn-link {
            display: flex; align-items: center; justify-content: center;
            width: 100%;
            padding: 14px 22px;
            background: linear-gradient(135deg, #b91c1c, #e50914, #ff2d3b);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            box-shadow: 0 4px 22px rgba(229,9,20,0.45);
            margin-top: 4px;
        }
        .btn-link:hover { background: linear-gradient(135deg, #e50914, #ff4d5a); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(229,9,20,0.6); }
        .btn-link:active { transform: translateY(0); }

        .confirmed-badge {
            font-family: 'Orbitron', monospace;
            font-size: 1.1rem;
            font-weight: 900;
            color: #22c55e;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(34,197,94,0.5);
            display: flex; align-items: center; gap: 8px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(168,85,247,0.25), rgba(236,72,153,0.2), transparent);
            margin: 14px 0;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .topbar { padding: 0 14px; height: 54px; }
            .brand-name { font-size: 0.72rem; letter-spacing: 1px; }
            .btn-top span { display: none; }
            .btn-top { padding: 8px 10px; }
            .main { padding: 18px 12px 60px; }
            .card-body { padding: 14px 15px 16px; }
            .card-foot { flex-direction: column; align-items: flex-start; }
            .card-actions { width: 100%; }
            .btn-copy, .btn-link { width: 100%; justify-content: center; }
            .otp-code { letter-spacing: 6px; }
        }
        @media (max-width: 380px) {
            .brand-name { font-size: 0.62rem; }
        }
    </style>
</head>
<body>

<div class="bg-fixed" id="bg-fixed">
    <div class="bg-blur-img" id="bg-blur"></div>
    <div class="bg-main-img" id="bg-main"></div>
    <div class="bg-overlay"></div>
</div>

<div class="topbar">
    <div class="topbar-inner">
        <div class="brand">
            <img src="/static/uploads/logo_pg.png" class="brand-logo" alt="PG" onerror="this.style.display='none'">
            <span class="brand-name">PAUDRONIX GT</span>
        </div>

        <div class="live-badge">
            <div class="live-dot"></div>
            <span id="status-text">EN VIVO</span>
        </div>

        <div class="topbar-actions">
            {% if session.get('logged_in') %}
            <a href="/admin" class="btn-top yellow">⚙ <span>ADMIN</span></a>
            {% endif %}
            <button id="btn-hist" class="btn-top orange">↺ <span>HISTORIAL</span></button>
            <button onclick="location.reload()" class="btn-top">⚡ <span>RECARGAR</span></button>
            <a href="/logout" class="btn-top">✕ <span>SALIR</span></a>
        </div>
    </div>
</div>

<div class="main">
    <div class="section-header">
        <span class="section-title">Códigos recientes</span>
        <div class="section-line"></div>
    </div>

    <div class="empty-state" id="empty-state">
        <div class="empty-icon">📡</div>
        <div class="empty-title">ESCANEANDO</div>
        <div class="empty-sub">Los códigos aparecen aquí al instante</div>
    </div>
    <div id="otp-list"></div>
</div>

<script>
    const socket = io({ transports: ['polling'], reconnection: true, reconnectionAttempts: Infinity, reconnectionDelay: 1000 });

    socket.on('connect', () => {
        document.getElementById('status-text').textContent = 'EN VIVO';
        socket.emit('get_history');
    });
    socket.on('disconnect', () => {
        document.getElementById('status-text').textContent = 'RECONECTANDO';
    });

    function updateBackground(url) {
        if (!url) return;
        const isVideo = url.match(/\.(mp4|webm|mov)$/i);
        if (isVideo) {
            const bg = document.getElementById('bg-fixed');
            const vid = document.createElement('video');
            vid.autoplay = true; vid.muted = true; vid.loop = true; vid.playsInline = true;
            vid.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);min-width:100%;min-height:100%;object-fit:cover;opacity:0.4;';
            vid.innerHTML = `<source src="${url}" type="video/${url.split('.').pop()}">`;
            bg.insertBefore(vid, bg.firstChild);
        } else {
            const pos = '{{ background_position | default("center center") }}';
            document.getElementById('bg-blur').style.backgroundImage = `url('${url}')`;
            document.getElementById('bg-blur').style.backgroundPosition = pos;
            document.getElementById('bg-main').style.backgroundImage = `url('${url}')`;
            document.getElementById('bg-main').style.backgroundPosition = pos;
        }
    }

    {% if background_url %}
    updateBackground('{{ background_url }}');
    {% else %}
    fetch('/admin/get_bg_url').then(r => r.json()).then(d => { if (d.panel) updateBackground(d.panel); });
    {% endif %}

    document.getElementById('btn-hist').onclick = () => socket.emit('get_history');

    // ── Local cache ─────────────────────────────────────────────────────────
    const MAX_ITEMS = 4;
    let cachedItems = [];   // newest first, max 20

    function itemKey(d) {
        return (d.sender || '') + '|' + (d.subject || '') + '|' + (d.code || d.button_url || '');
    }

    function mergeItem(newItem) {
        const k = itemKey(newItem);
        if (!cachedItems.some(x => itemKey(x) === k)) {
            cachedItems.unshift(newItem);
            if (cachedItems.length > MAX_ITEMS) cachedItems.pop();
            return true;
        }
        return false;
    }

    function renderAll(flashFirst) {
        const list  = document.getElementById('otp-list');
        const empty = document.getElementById('empty-state');
        list.innerHTML = '';
        if (!cachedItems.length) { if (empty) empty.style.display = ''; return; }
        if (empty) empty.style.display = 'none';
        // Render oldest→newest so newest ends up on top via insertBefore
        [...cachedItems].reverse().forEach((item, idx) => {
            const isNew = flashFirst && idx === cachedItems.length - 1;
            renderCard(item, isNew);
        });
    }
    // ────────────────────────────────────────────────────────────────────────

    socket.on('history_data', (data) => {
        // Merge server history into local cache (history wins for duplicates)
        const incoming = data.slice(0, MAX_ITEMS);
        incoming.forEach(item => {
            const k = itemKey(item);
            const idx = cachedItems.findIndex(x => itemKey(x) === k);
            if (idx === -1) cachedItems.push(item);
        });
        // Keep newest MAX_ITEMS
        cachedItems = cachedItems.slice(0, MAX_ITEMS);
        renderAll(false);
    });

    socket.on('new_otp', (data) => {
        document.dispatchEvent(new Event('bear-otp'));
        const added = mergeItem(data);
        if (added) renderAll(true);
    });

    function renderCard(data, isNew) {
        const list = document.getElementById('otp-list');
        const isNetflix = (data.sender || '').toLowerCase().includes('netflix') || (data.subject || '').toLowerCase().includes('netflix');
        const hasCode = data.code && data.code !== 'CONFIRMADO';
        const isConfirmed = data.code === 'CONFIRMADO';
        const hasBtn = data.button_url && data.button_url.length > 0;

        const platform = isNetflix ? 'Netflix' : senderPlatform(data.sender);
        const stripeClass = isNetflix ? '' : 'blue';
        const platformClass = isNetflix ? '' : 'blue';

        // Use the real button text from the email; fall back to a generic label
        const btnLabel = (data.button_label && data.button_label.trim())
            ? data.button_label
            : (isNetflix ? 'Obtener código' : 'Abrir enlace');

        let footHtml = '';
        if (hasCode) {
            footHtml += `
                <div class="otp-code">${escHtml(data.code)}</div>
                <div class="card-actions" style="width:100%">
                    <button class="btn-copy" onclick="copyCode('${escHtml(data.code)}', this)">Copiar código</button>
                    ${hasBtn ? `<a href="${escHtml(data.button_url)}" target="_blank" rel="noopener noreferrer" class="btn-link">${escHtml(btnLabel)}</a>` : ''}
                </div>`;
        } else if (isConfirmed) {
            footHtml += `<div class="confirmed-badge"><span>✓</span> CONFIRMADO</div>`;
        } else if (hasBtn) {
            footHtml += `
                <div class="card-actions" style="width:100%">
                    <a href="${escHtml(data.button_url)}" target="_blank" rel="noopener noreferrer" class="btn-link">${escHtml(btnLabel)}</a>
                </div>`;
        }

        const card = document.createElement('div');
        card.className = 'otp-card' + (isNew ? ' new-flash' : '');
        card.innerHTML = `
            <div class="card-stripe ${stripeClass}"></div>
            <div class="card-body">
                <div class="card-head">
                    <div>
                        <div class="card-platform ${platformClass}">${escHtml(platform)}</div>
                        <div class="card-sender">${escHtml(senderName(data.sender))}</div>
                    </div>
                    <div class="card-time">🕒 ${escHtml(data.time)}</div>
                </div>
                <div class="divider"></div>
                <div class="card-foot">${footHtml}</div>
            </div>
        `;
        list.insertBefore(card, list.firstChild);
    }

    function copyCode(code, btn) {
        const orig = btn.textContent;
        const done = () => {
            btn.textContent = '✓ Copiado';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(code).then(done).catch(() => fallbackCopy(code, done));
        } else { fallbackCopy(code, done); }
    }
    function fallbackCopy(code, done) {
        const ta = document.createElement('textarea');
        ta.value = code;
        ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand('copy'); done(); } catch(e) {}
        document.body.removeChild(ta);
    }

    function senderName(sender) {
        if (!sender) return '';
        const m = sender.match(/^"?(.+?)"?\s*</);
        if (m) return m[1].trim();
        if (sender.includes('@')) return sender.split('@')[0];
        return sender;
    }

    function senderPlatform(sender) {
        if (!sender) return 'EMAIL';
        const s = sender.toLowerCase();
        if (s.includes('amazon') || s.includes('prime')) return 'Amazon';
        if (s.includes('google')) return 'Google';
        if (s.includes('apple')) return 'Apple';
        if (s.includes('facebook') || s.includes('meta')) return 'Facebook';
        if (s.includes('instagram')) return 'Instagram';
        if (s.includes('whatsapp')) return 'WhatsApp';
        if (s.includes('tiktok')) return 'TikTok';
        if (s.includes('twitter') || s.includes('x.com')) return 'Twitter / X';
        if (s.includes('spotify')) return 'Spotify';
        if (s.includes('paypal')) return 'PayPal';
        return 'EMAIL';
    }

    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
